{% extends "base.html" %}
{% block title %}登录 - 医院管理系统{% endblock %}
<!-- 页面内容结束 -->
{% block content %}
<!-- 页面内容开始 -->
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-hospital fa-3x text-primary mb-3"></i>
                    <h3>用户登录</h3>
                    <p class="text-muted">欢迎使用医院管理系统</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-2"></i>用户名</label>
                        <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-lock me-2"></i>密码</label>
                        <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fas fa-user-tag me-2"></i>角色</label>
                        <select name="role" class="form-select">
                            <option value="">所有角色</option>
                            <option value="admin">管理员</option>
                            <option value="doctor">医生</option>
                            <option value="patient">病人</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>登录
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">还没有账号？<a href="{{ url_for('register') }}" class="text-primary">立即注册</a></p>
                </div>
                <hr>
                <div class="text-center">
                    <small class="text-muted">测试账号：admin / admin123 (管理员)</small><br>
                    <small class="text-muted">doctor1 / 123456 (医生)</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
<!-- 页面内容结束 -->
